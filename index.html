<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <title>GPX Viewer - Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
  <script src="https://unpkg.com/@mapbox/togeojson@0.16.0/togeojson.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <div class="top-bar">
    <div class="segment-calc">
      De la: <input type="number" id="kmA" step="0.1" placeholder="0"> km
      La: <input type="number" id="kmB" step="0.1" placeholder="10"> km
      <button onclick="calculateSegmentGain()">Calculează</button>
      <span id="segmentResult"></span>
    </div>
    <div class="controls">
      <input type="file" id="fileInput" accept=".gpx" />
      <button onclick="fullReset()">Reset Vizual</button>
    </div>
    <div id="info">Așteptare fișier...</div>
  </div>

  <div id="map"></div>

  <div class="chart-wrapper">
    <canvas id="chart"></canvas>
  </div>

  <script src="app.js"></script>
</body>
</html>
